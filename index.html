<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nenadiya Institute | Professional Management</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

    <style>
        :root { --navy: #0f172a; --accent: #2563eb; --red: #e11d48; --green: #059669; }
        body { background: #f1f5f9; font-family: 'Segoe UI', Arial, sans-serif; }
        .tab-sec { background: white; border-radius: 15px; padding: 20px; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); }
        
        /* Professional ID Card Design */
        .id-card { width: 350px; height: 500px; background: white; border-radius: 20px; border: 2px solid #ddd; margin: auto; overflow: hidden; position: relative; box-shadow: 0 10px 25px rgba(0,0,0,0.2); }
        .id-top { height: 160px; background: var(--navy); color: white; text-align: center; padding-top: 20px; border-bottom: 8px solid var(--red); }
        .id-photo-wrap { width: 130px; height: 130px; border-radius: 50%; border: 5px solid white; margin: -70px auto 0; overflow: hidden; background: #eee; position: relative; z-index: 5; }
        .id-photo-wrap img { width: 100%; height: 100%; object-fit: cover; }
        .id-content { text-align: center; padding: 20px; }
        .qr-area { display: flex; justify-content: center; margin-top: 15px; }
    </style>
</head>
<body>

<div class="bg-dark text-white p-3 text-center mb-4">
    <h2 class="fw-bold m-0">නැණදිය (NENADIYA)</h2>
    <div id="dbStatus" class="badge bg-warning text-dark mt-2">Connecting...</div>
    <div id="autoAlert" class="mt-2 small text-info"></div>
</div>

<div class="container-fluid pb-5">
    <div class="row g-2 mb-4 bg-white p-3 rounded-3 shadow-sm sticky-top">
        <div class="col-md-3"><select id="activeGrade" class="form-select border-primary" onchange="renderAll()"></select></div>
        <div class="col-md-3"><select id="activeMonth" class="form-select border-primary" onchange="renderAll()"></select></div>
        <div class="col-md-4"><input type="text" id="stuSearch" class="form-control" placeholder="Search Student..." onkeyup="renderAll()"></div>
        <div class="col-md-2"><button class="btn btn-primary w-100" data-bs-toggle="modal" data-bs-target="#regModal">+ Add Student</button></div>
    </div>

    <ul class="nav nav-pills nav-justified mb-4" id="mainTabs">
        <li class="nav-item"><a class="nav-link active fw-bold" onclick="showTab('att')">Attendance</a></li>
        <li class="nav-item"><a class="nav-link fw-bold" onclick="showTab('fees')">Fees Management</a></li>
        <li class="nav-item"><a class="nav-link fw-bold" onclick="showTab('marks')">Exam Progress</a></li>
    </ul>

    <div id="attSec" class="tab-sec">
        <div class="table-responsive"><table class="table align-middle"><tbody id="attBody"></tbody></table></div>
    </div>

    <div id="feesSec" class="tab-sec d-none">
        <div class="table-responsive"><table class="table align-middle"><tbody id="feeBody"></tbody></table></div>
    </div>

    <div id="marksSec" class="tab-sec d-none">
        <div class="table-responsive"><table class="table align-middle">
            <thead class="table-light"><tr><th>Student</th><th>Marks</th><th>Rank</th><th>Remarks</th><th>WhatsApp Report</th></tr></thead>
            <tbody id="marksBody"></tbody>
        </table></div>
    </div>
</div>

<div class="modal fade" id="idModal" tabindex="-1"><div class="modal-dialog modal-dialog-centered"><div class="modal-content bg-transparent border-0 text-center">
    <div id="idCardToExport" class="id-card">
        <div class="id-top"><h3>NENADIYA</h3><p>Higher Educational Institute</p></div>
        <div class="id-photo-wrap"><img id="idImg" src=""></div>
        <div class="id-content">
            <h4 id="idName" class="fw-bold mb-1"></h4>
            <p id="idGradeDisp" class="badge bg-primary fs-6"></p>
            <div class="row mt-3 text-start small border rounded p-2 mx-1">
                <div class="col-6">ID: <b id="idVal"></b></div>
                <div class="col-6 text-end">Year: <b>2026</b></div>
            </div>
            <div id="idQr" class="qr-area"></div>
        </div>
    </div>
    <button class="btn btn-success mt-3" onclick="downloadID()">Download ID Card</button>
</div></div></div>

<div class="modal fade" id="regModal" tabindex="-1"><div class="modal-dialog"><div class="modal-content"><div class="modal-body p-4">
    <h5 class="mb-3">Student Registration</h5>
    <input type="hidden" id="editIdx">
    <input type="text" id="regName" class="form-control mb-2" placeholder="Full Name">
    <input type="text" id="regWa" class="form-control mb-2" placeholder="WhatsApp (e.g. 94771234567)">
    <select id="regGrade" class="form-select mb-3"></select>
    <input type="file" id="regPhoto" class="form-control mb-3" accept="image/*">
    <button class="btn btn-primary w-100" onclick="saveStudent()">Save Student</button>
</div></div></div></div>

<script>
    const config = {
        apiKey: "AIzaSyCWLthmljW8jW4Y97SJgnfw0GLBIBQjF3M",
        authDomain: "nenadiya-database.firebaseapp.com",
        databaseURL: "https://nenadiya-database-default-rtdb.firebaseio.com/",
        projectId: "nenadiya-database",
        storageBucket: "nenadiya-database.firebasestorage.app",
        messagingSenderId: "223459963945",
        appId: "1:223459963945:web:5b2781f3ed85fe9f25838"
    };
    firebase.initializeApp(config);
    const db = firebase.database();

    let students = [];
    const months = ["January","February","March","April","May","June","July","August","September","October","November","December"];

    window.onload = () => {
        const gSel = document.getElementById('activeGrade');
        const regGSel = document.getElementById('regGrade');
        for(let i=1; i<=13; i++) ['N','S','A'].forEach(s => {
            let o = new Option(`Grade ${i}${s}`, `Grade ${i}${s}`);
            gSel.add(o); regGSel.add(o.cloneNode(true));
        });
        for(let i=1; i<=10; i++) {
            let o = new Option(`Individual ${i}`, `Individual ${i}`);
            gSel.add(o); regGSel.add(o.cloneNode(true));
        }
        
        const mSel = document.getElementById('activeMonth');
        months.forEach((m, i) => mSel.add(new Option(m, i)));
        mSel.value = new Date().getMonth();

        db.ref('nenadiya_v4').on('value', (snap) => {
            students = snap.val() || [];
            renderAll();
            checkAutoDues();
            document.getElementById('dbStatus').innerText = "Cloud Active";
            document.getElementById('dbStatus').className = "badge bg-success mt-2";
        });
    };

    function renderAll() {
        const m = parseInt(document.getElementById('activeMonth').value);
        const g = document.getElementById('activeGrade').value;
        const q = document.getElementById('stuSearch').value.toLowerCase();
        
        const filtered = students.filter(s => s.grade === g && s.name.toLowerCase().includes(q));
        const sorted = [...filtered].sort((a,b) => (b.marks?.[m]||0) - (a.marks?.[m]||0));

        let attH="", feeH="", marksH="";
        filtered.forEach(s => {
            const idx = students.indexOf(s);
            const rank = sorted.findIndex(x => x.id === s.id) + 1;
            const score = s.marks?.[m] || 0;
            const remark = score > 75 ? "Excellent Progress" : score > 50 ? "Good" : "Try Hard";

            attH += `<tr><td><b>${s.name}</b></td><td class="text-end"><button class="btn btn-sm btn-info" onclick="showID(${idx})">ID Card</button> <button class="btn btn-sm btn-danger" onclick="delStu(${idx})">Delete</button></td></tr>`;
            
            let paid = s.fees?.[m];
            feeH += `<tr><td><b>${s.name}</b></td><td><span class="badge ${paid?'bg-success':'bg-danger'}">${paid?'PAID':'DUE'}</span></td><td><button class="btn btn-sm btn-outline-dark" onclick="toggleFee(${idx},${!paid})">${paid?'Undo':'Pay'}</button> <button class="btn btn-sm btn-success" onclick="sendWa(${idx},'fee')">WhatsApp</button></td></tr>`;

            marksH += `<tr><td><b>${s.name}</b></td><td><input type="number" class="form-control w-75" value="${score}" onchange="setMark(${idx},this.value)"></td><td>Rank: ${rank}</td><td>${remark}</td><td><button class="btn btn-sm btn-primary" onclick="sendWa(${idx},'report',${rank},'${remark}')">Send Report</button></td></tr>`;
        });

        document.getElementById('attBody').innerHTML = attH;
        document.getElementById('feeBody').innerHTML = feeH;
        document.getElementById('marksBody').innerHTML = marksH;
    }

    function checkAutoDues() {
        const today = new Date();
        if(today.getDate() >= 25) {
            document.getElementById('autoAlert').innerText = "⚠️ 25th of the month reached: Fee reminders ready for delivery.";
        }
    }

    function sendWa(i, type, rank, remark) {
        const s = students[i];
        const m = months[document.getElementById('activeMonth').value];
        let msg = "";

        if(type === 'fee') {
            const isPaid = s.fees?.[document.getElementById('activeMonth').value];
            if(isPaid) {
                msg = `*නැණදිය (Nenadiya) - Payment Received*%0AStudent: ${s.name}%0AMonth: ${m}%0AStatus: SUCCESSFUL / සාර්ථකයි ✅%0AThank you! / ස්තූතියි!`;
            } else {
                msg = `*නැණදිය (Nenadiya) - Fee Reminder*%0AStudent: ${s.name}%0AMonth: ${m}%0AStatus: PENDING / ගෙවීමට ඇත ❌%0APlease settle the fee before the end of the month.%0Aකරුණාකර මාසය අවසන් වීමට පෙර පන්ති ගාස්තු ගෙවා අවසන් කරන්න.`;
            }
        } else {
            const mark = s.marks?.[document.getElementById('activeMonth').value] || 0;
            msg = `*නැණදිය (Nenadiya) Progress Report*%0AStudent: ${s.name}%0AMonth: ${m}%0A--------------------------%0AMarks: ${mark}/100%0AClass Rank: ${rank}%0AProgress: ${remark}%0Aප්‍රගතිය: ${remark === 'Excellent Progress' ? 'විශිෂ්ටයි' : 'තව උත්සාහ කරන්න'}%0A--------------------------`;
        }
        window.open(`https://wa.me/${s.wa}?text=${msg}`);
    }

    // --- ID CARD LOGIC ---
    function showID(i) {
        const s = students[i];
        document.getElementById('idName').innerText = s.name;
        document.getElementById('idGradeDisp').innerText = s.grade;
        document.getElementById('idVal').innerText = s.id;
        document.getElementById('idImg').src = s.photo;
        document.getElementById('idQr').innerHTML = "";
        new QRCode(document.getElementById('idQr'), { text: s.id, width: 80, height: 80 });
        new bootstrap.Modal(document.getElementById('idModal')).show();
    }

    function downloadID() {
        html2canvas(document.getElementById('idCardToExport')).then(c => {
            let l = document.createElement('a'); l.download = "ID_Card.png"; l.href = c.toDataURL(); l.click();
        });
    }

    // --- CORE ACTIONS ---
    async function saveStudent() {
        const f = document.getElementById('regPhoto').files[0];
        let photo = "https://via.placeholder.com/150";
        if(f) photo = await new Promise(r => { const rd = new FileReader(); rd.onload = e => r(e.target.result); rd.readAsDataURL(f); });

        students.push({
            id: "NEN" + Date.now().toString().slice(-5),
            name: document.getElementById('regName').value,
            wa: document.getElementById('regWa').value,
            grade: document.getElementById('regGrade').value,
            photo: photo, fees: {}, marks: {}
        });
        db.ref('nenadiya_v4').set(students);
        bootstrap.Modal.getInstance(document.getElementById('regModal')).hide();
    }

    function toggleFee(i, v) { 
        if(!students[i].fees) students[i].fees = {};
        students[i].fees[document.getElementById('activeMonth').value] = v;
        db.ref('nenadiya_v4').set(students);
    }

    function setMark(i, v) {
        if(!students[i].marks) students[i].marks = {};
        students[i].marks[document.getElementById('activeMonth').value] = parseInt(v);
        db.ref('nenadiya_v4').set(students);
    }

    function delStu(i) { if(confirm("Delete student permanently?")) { students.splice(i,1); db.ref('nenadiya_v4').set(students); } }
    function showTab(id) {
        document.querySelectorAll('.tab-sec').forEach(s => s.classList.add('d-none'));
        document.getElementById(id+'Sec').classList.remove('d-none');
        document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
        event.target.classList.add('active');
    }
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
