<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>නැණදිය | Nenadiya Management</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>

    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

    <style>
        :root { --blue: #2563eb; --navy: #1e3a8a; --red: #ef4444; }
        body { background: #f0f4f8; font-family: 'Segoe UI', sans-serif; }
        .header-section { background: linear-gradient(135deg, var(--navy), var(--blue)); color: white; padding: 20px; text-align: center; border-bottom: 6px solid var(--red); border-radius: 0 0 30px 30px; }
        .card-custom { background: white; border-radius: 20px; padding: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        .stu-photo { width: 45px; height: 45px; border-radius: 50%; object-fit: cover; }
        #reader { border-radius: 15px; overflow: hidden; background: #000; }
    </style>
</head>
<body>

<div class="header-section mb-4">
    <div id="saveStatus" class="badge bg-dark mb-2">Cloud Connected</div>
    <h1>නැණදිය උසස් අධ්‍යාපන ආයතනය</h1>
    <p>Management System 2026</p>
</div>

<div class="container pb-5">
    <div class="row mb-4 g-2">
        <div class="col-6"><select id="activeMonth" class="form-select shadow-sm" onchange="renderAll()"></select></div>
        <div class="col-6"><select id="activeGrade" class="form-select shadow-sm" onchange="renderAll()"></select></div>
    </div>

    <div class="card-custom">
        <div class="row g-2 mb-4 p-3 bg-light rounded">
            <div class="col-md-4"><input type="text" id="regName" class="form-control" placeholder="Student Name"></div>
            <div class="col-md-4"><input type="text" id="regWa" class="form-control" placeholder="WhatsApp (94...)"></div>
            <div class="col-md-4"><button class="btn btn-primary w-100" onclick="addStudent()">Add Student</button></div>
        </div>

        <div class="row mb-4">
            <div class="col-md-6 mx-auto">
                <div id="reader"></div>
                <button class="btn btn-dark btn-sm w-100 mt-2" onclick="startScanner()">Start Attendance Camera</button>
            </div>
        </div>

        <div class="table-responsive">
            <table class="table align-middle">
                <thead><tr><th>Student</th><th>WhatsApp</th><th>Actions</th></tr></thead>
                <tbody id="detailsBody"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
    // YOUR FIREBASE CONFIG (Already filled for you!)
    const firebaseConfig = {
        apiKey: "AIzaSyCWLthmljW8jW4Y97SJgnfw0GLBIBQjF3M",
        authDomain: "nenadiya-database.firebaseapp.com",
        databaseURL: "https://nenadiya-database-default-rtdb.firebaseio.com/",
        projectId: "nenadiya-database",
        storageBucket: "nenadiya-database.firebasestorage.app",
        messagingSenderId: "223459963945",
        appId: "1:223459963945:web:5b2781f3ed85fe9f25838"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    let students = [];
    const months = ["January","February","March","April","May","June","July","August","September","October","November","December"];

    window.onload = () => {
        const mSel = document.getElementById('activeMonth');
        months.forEach((m,i) => mSel.add(new Option(m, i)));
        mSel.value = new Date().getMonth();

        const gSel = document.getElementById('activeGrade');
        for(let i=1; i<=11; i++) { gSel.add(new Option(`Grade ${i}`, `Grade ${i}`)); }

        // START LISTENING TO CLOUD
        db.ref('nenadiya_data/students').on('value', (snapshot) => {
            students = snapshot.val() || [];
            renderAll();
            document.getElementById('saveStatus').innerText = "Live Cloud Synced";
        });
    };

    function addStudent() {
        const n = document.getElementById('regName').value;
        const w = document.getElementById('regWa').value;
        if(!n || !w) return alert("Enter Name and Phone");

        const newStudent = {
            id: "NEN" + Math.floor(1000 + Math.random() * 9000),
            name: n, wa: w, grade: document.getElementById('activeGrade').value,
            annual: Array.from({length:12}, () => ({paid:false, att:[]}))
        };
        
        students.push(newStudent);
        saveToCloud();
        document.getElementById('regName').value = "";
        document.getElementById('regWa').value = "";
    }

    function saveToCloud() {
        db.ref('nenadiya_data/students').set(students);
    }

    function renderAll() {
        const g = document.getElementById('activeGrade').value;
        const filtered = students.filter(s => s.grade === g);
        let html = "";
        filtered.forEach((s, idx) => {
            html += `<tr>
                <td><b>${s.name}</b><br><small>${s.id}</small></td>
                <td>${s.wa}</td>
                <td><button class="btn btn-sm btn-danger" onclick="deleteStudent(${students.indexOf(s)})">Delete</button></td>
            </tr>`;
        });
        document.getElementById('detailsBody').innerHTML = html;
    }

    function deleteStudent(i) { if(confirm("Delete student?")) { students.splice(i,1); saveToCloud(); } }

    function startScanner() {
        const html5QrCode = new Html5Qrcode("reader");
        html5QrCode.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, (id) => {
            alert("Scanned ID: " + id);
            // Attendance logic goes here
        });
    }
</script>
</body>
</html>
