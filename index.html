<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nenadiya | Executive Institute Management</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.10.5/font/bootstrap-icons.min.css">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

    <style>
        :root { 
            --primary: #0f172a; /* Deep Navy */
            --accent: #b45309;  /* Golden Bronze */
            --success: #059669; /* Emerald */
            --bg: #f8fafc; 
            --card-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }

        body { 
            background-color: var(--bg); 
            font-family: 'Inter', sans-serif; 
            color: #1e293b;
        }

        /* Header Styling */
        .main-header {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            color: white;
            padding: 2rem 1rem;
            border-bottom: 4px solid var(--accent);
            text-align: center;
        }

        /* Navigation Pills */
        .nav-pills .nav-link {
            color: #64748b;
            font-weight: 600;
            border-radius: 8px;
            padding: 10px 20px;
            transition: 0.3s;
        }
        .nav-pills .nav-link.active {
            background-color: var(--primary) !important;
            color: white !important;
            box-shadow: 0 4px 6px rgba(15, 23, 42, 0.2);
        }

        /* Cards & Tables */
        .glass-card {
            background: white;
            border-radius: 16px;
            border: 1px solid #e2e8f0;
            box-shadow: var(--card-shadow);
            padding: 20px;
            margin-bottom: 25px;
        }

        .table thead {
            background-color: #f1f5f9;
            text-transform: uppercase;
            font-size: 0.75rem;
            letter-spacing: 0.05em;
        }

        /* ID Card Styling - High End */
        .id-card { 
            width: 350px; height: 500px; 
            background: white; border-radius: 24px; 
            overflow: hidden; position: relative; 
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }
        .id-top { 
            height: 180px; background: var(--primary); 
            color: white; padding-top: 30px;
            clip-path: ellipse(120% 100% at 50% 0%);
        }
        .id-photo-wrap { 
            width: 140px; height: 140px; border-radius: 50%; 
            border: 6px solid white; margin: -70px auto 0; 
            overflow: hidden; position: relative; z-index: 5;
            background: #cbd5e1;
        }

        /* Specialized Buttons */
        .btn-wa {
            background-color: #22c55e;
            color: white;
            border: none;
            font-weight: 600;
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 0.85rem;
        }
        .btn-wa:hover { background-color: #16a34a; color: white; }
        
        .badge-att { font-size: 0.7rem; cursor: pointer; border-radius: 4px; padding: 4px 6px; }
    </style>
</head>
<body>

<header class="main-header">
    <h1 class="fw-bold tracking-tight m-0">නැණදිය (NENADIYA)</h1>
    <p class="opacity-75 small">Higher Educational Institute | Management System</p>
    <div id="dbStatus" class="badge bg-light text-dark mt-2">Checking Connection...</div>
</header>

<div class="container py-4">
    <div class="glass-card sticky-top" style="top: 10px; z-index: 1000;">
        <div class="row g-3 align-items-end">
            <div class="col-md-3 col-6">
                <label class="small fw-bold text-muted mb-1">Select Grade</label>
                <select id="activeGrade" class="form-select" onchange="renderAll()"></select>
            </div>
            <div class="col-md-3 col-6">
                <label class="small fw-bold text-muted mb-1">Month</label>
                <select id="activeMonth" class="form-select" onchange="renderAll()"></select>
            </div>
            <div class="col-md-4 col-8">
                <label class="small fw-bold text-muted mb-1">Search Database</label>
                <input type="text" id="stuSearch" class="form-control" placeholder="Search student name..." onkeyup="renderAll()">
            </div>
            <div class="col-md-2 col-4 text-end">
                <button class="btn btn-primary w-100 fw-bold" data-bs-toggle="modal" data-bs-target="#regModal">REGISTER</button>
            </div>
        </div>
    </div>

    <ul class="nav nav-pills nav-justified mb-4" id="pills-tab" role="tablist">
        <li class="nav-item"><a class="nav-link active" onclick="showTab('att')"><i class="bi bi-person-check me-2"></i>ATTENDANCE</a></li>
        <li class="nav-item"><a class="nav-link" onclick="showTab('fees')"><i class="bi bi-credit-card me-2"></i>FINANCE</a></li>
        <li class="nav-item"><a class="nav-link" onclick="showTab('marks')"><i class="bi bi-bar-chart me-2"></i>ACADEMICS</a></li>
    </ul>

    <div id="attSec" class="glass-card">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <input type="date" id="attDate" class="form-control w-25" onchange="renderAll()">
            <button class="btn btn-outline-dark fw-bold" onclick="toggleScanner()"><i class="bi bi-qr-code-scan"></i> SCAN ID</button>
        </div>
        <div id="reader"></div>
        <div class="table-responsive"><table class="table align-middle"><tbody id="attBody"></tbody></table></div>
    </div>

    <div id="feesSec" class="glass-card d-none">
        <div class="table-responsive"><table class="table align-middle">
            <thead><tr><th>Student Name</th><th>History</th><th>Current Status</th><th>WhatsApp Alert</th></tr></thead>
            <tbody id="feeBody"></tbody>
        </table></div>
    </div>

    <div id="marksSec" class="glass-card d-none">
        <div class="table-responsive"><table class="table align-middle">
            <thead><tr><th>Student Name</th><th>Marks</th><th>Rank</th><th>Progress</th><th>Action</th></tr></thead>
            <tbody id="marksBody"></tbody>
        </table></div>
    </div>
</div>

<div class="modal fade" id="regModal" tabindex="-1"><div class="modal-dialog"><div class="modal-content shadow-lg border-0 p-4 rounded-4">
    <h4 class="fw-bold mb-3">Add New Student</h4>
    <input type="text" id="regName" class="form-control mb-3 p-3" placeholder="Full Student Name">
    <input type="text" id="regWa" class="form-control mb-3 p-3" placeholder="WhatsApp Number (e.g. 947...)">
    <select id="regGrade" class="form-select mb-3 p-3"></select>
    <label class="small text-muted mb-1">Student Profile Photo</label>
    <input type="file" id="regPhoto" class="form-control mb-4" accept="image/*">
    <button class="btn btn-primary w-100 py-3 fw-bold rounded-3" onclick="saveStudent()">SAVE STUDENT PROFILE</button>
</div></div></div>

<div class="modal fade" id="idModal" tabindex="-1"><div class="modal-dialog modal-dialog-centered"><div class="modal-content bg-transparent border-0 text-center">
    <div id="idCardToExport" class="id-card">
        <div class="id-top"><h4>NENADIYA</h4><p class="small">Higher Educational Institute</p></div>
        <div class="id-photo-wrap"><img id="idImg" src="" style="width:100%; height:100%; object-fit:cover;"></div>
        <div class="p-3">
            <h4 id="idName" class="fw-bold mt-2"></h4>
            <p id="idGradeDisp" class="badge bg-secondary mb-3"></p>
            <div class="row text-start px-3 mb-3"><div class="col-6 small">Reg ID: <b id="idVal"></b></div><div class="col-6 text-end small">Year: <b>2026</b></div></div>
            <div id="idQr" class="d-flex justify-content-center mt-2"></div>
        </div>
    </div>
    <div class="mt-4"><button class="btn btn-light fw-bold" onclick="downloadID()">DOWNLOAD PROFESSIONAL ID</button></div>
</div></div></div>

<script>
    /* CORE SYSTEM LOGIC - SAME AS PREVIOUS (V5.1) 
       RETAINING ALL FIREBASE, WHATSAPP, AND RANKING FEATURES 
    */
    const config = {
        apiKey: "AIzaSyCWLthmljW8jW4Y97SJgnfw0GLBIBQjF3M",
        authDomain: "nenadiya-database.firebaseapp.com",
        databaseURL: "https://nenadiya-database-default-rtdb.firebaseio.com/",
        projectId: "nenadiya-database",
        storageBucket: "nenadiya-database.firebasestorage.app",
        messagingSenderId: "223459963945",
        appId: "1:223459963945:web:5b2781f3ed85fe9f25838"
    };
    firebase.initializeApp(config);
    const db = firebase.database();
    let students = [];
    const months = ["January","February","March","April","May","June","July","August","September","October","November","December"];
    let html5QrCode;

    window.onload = () => {
        const gSel = document.getElementById('activeGrade'), regGSel = document.getElementById('regGrade');
        for(let i=1; i<=13; i++) ['N','S','A'].forEach(s => {
            let o = new Option(`Grade ${i}${s}`, `Grade ${i}${s}`);
            gSel.add(o); regGSel.add(o.cloneNode(true));
        });
        for(let i=1; i<=10; i++) {
            let o = new Option(`Individual ${i}`, `Individual ${i}`);
            gSel.add(o); regGSel.add(o.cloneNode(true));
        }
        document.getElementById('activeMonth').value = new Date().getMonth();
        months.forEach((m, i) => document.getElementById('activeMonth').add(new Option(m, i)));
        document.getElementById('attDate').valueAsDate = new Date();

        db.ref('nenadiya_v4').on('value', (snap) => {
            students = snap.val() || [];
            renderAll();
            document.getElementById('dbStatus').innerText = "Live Cloud Active";
            document.getElementById('dbStatus').className = "badge bg-success mt-2";
        });
    };

    function renderAll() {
        const m = parseInt(document.getElementById('activeMonth').value), g = document.getElementById('activeGrade').value, q = document.getElementById('stuSearch').value.toLowerCase(), d = document.getElementById('attDate').value;
        const filtered = students.filter(s => s.grade === g && s.name.toLowerCase().includes(q));
        const sorted = [...filtered].sort((a,b) => (b.marks?.[m]||0) - (a.marks?.[m]||0));

        let attH="", feeH="", marksH="";
        filtered.forEach(s => {
            const idx = students.indexOf(s);
            
            // Attendance
            let attHist = "";
            if(s.att && s.att[m]) s.att[m].sort().forEach(dt => attHist += `<span class="badge bg-secondary opacity-75 me-1 badge-att" onclick="removeAtt(${idx},'${dt}')">P:${dt.split('-')[2]}</span>`);
            let isP = s.att?.[m]?.includes(d);
            attH += `<tr><td><h6 class="mb-0 fw-bold">${s.name}</h6></td><td>${attHist}</td><td class="text-end"><button class="btn btn-sm ${isP?'btn-success':'btn-outline-primary'}" onclick="markAtt(${idx},'P')">P</button><button class="btn btn-sm btn-outline-danger ms-1" onclick="markAtt(${idx},'A')">A</button><button class="btn btn-sm btn-dark ms-2" onclick="showID(${idx})">VIEW ID</button></td></tr>`;
            
            // Fees
            let feeHist = "";
            months.forEach((name, i) => { if(s.fees?.[i]) feeHist += `<span class="badge bg-primary opacity-50 me-1" style="font-size:0.6rem">${name.slice(0,3)}</span>`; });
            let paid = s.fees?.[m];
            feeH += `<tr><td><h6 class="mb-0 fw-bold">${s.name}</h6></td><td>${feeHist}</td><td><button class="btn btn-sm ${paid?'btn-success':'btn-danger'}" onclick="toggleFee(${idx},${!paid})">${paid?'SUCCESS':'UNPAID'}</button></td><td><button class="btn-wa" onclick="sendWa(${idx},'fee')">WHATSAPP</button></td></tr>`;

            // Academics
            const rank = sorted.findIndex(x => x.id === s.id) + 1;
            const score = s.marks?.[m] || 0;
            const rem = score >= 75 ? "Excellent Progress" : score >= 50 ? "Good Progress" : "Try Hard";
            marksH += `<tr><td><h6 class="mb-0 fw-bold">${s.name}</h6></td><td><input type="number" class="form-control border-0 bg-light w-50" value="${score}" onchange="setMark(${idx},this.value)"></td><td><span class="badge bg-dark">RANK ${rank}</span></td><td><small class="fw-bold text-primary">${rem}</small></td><td><button class="btn-wa" onclick="sendWa(${idx},'report',${rank},'${rem}')">SEND REPORT</button></td></tr>`;
        });
        document.getElementById('attBody').innerHTML = attH;
        document.getElementById('feeBody').innerHTML = feeH;
        document.getElementById('marksBody').innerHTML = marksH;
    }

    /* SAME HELPERS AS BEFORE (Scanner, WhatsApp, Firebase Setters) */
    function toggleScanner() { const r = document.getElementById('reader'); if(r.style.display==='block'){html5QrCode.stop(); r.style.display='none';} else {r.style.display='block'; html5QrCode=new Html5Qrcode("reader"); html5QrCode.start({facingMode:"environment"},{fps:10,qrbox:250},(t)=>{const i=students.findIndex(s=>s.id===t); if(i!==-1){markAtt(i,'P'); alert("Scanned: "+students[i].name);}});}}
    function markAtt(i,t){const m=document.getElementById('activeMonth').value,d=document.getElementById('attDate').value; if(!students[i].att)students[i].att={}; if(!students[i].att[m])students[i].att[m]=[]; if(t==='P'&&!students[i].att[m].includes(d))students[i].att[m].push(d); if(t==='A')students[i].att[m]=students[i].att[m].filter(x=>x!==d); db.ref('nenadiya_v4').set(students);}
    function removeAtt(i,d){if(confirm("Remove Attendance?")){const m=document.getElementById('activeMonth').value; students[i].att[m]=students[i].att[m].filter(x=>x!==d); db.ref('nenadiya_v4').set(students);}}
    function toggleFee(i,v){if(!students[i].fees)students[i].fees={}; students[i].fees[document.getElementById('activeMonth').value]=v; db.ref('nenadiya_v4').set(students);}
    function setMark(i,v){if(!students[i].marks)students[i].marks={}; students[i].marks[document.getElementById('activeMonth').value]=parseInt(v); db.ref('nenadiya_v4').set(students);}
    function sendWa(i,t,r,rem){
        const s=students[i], m=months[document.getElementById('activeMonth').value], p=s.fees?.[document.getElementById('activeMonth').value];
        let msg = t==='fee' ? (p?`*නැණදිය (Nenadiya) - Payment Received*%0AStudent: ${s.name}%0AMonth: ${m}%0AStatus: SUCCESSFUL / සාර්ථකයි ✅`:`*නැණදිය (Nenadiya) - Fee Reminder*%0AStudent: ${s.name}%0AMonth: ${m}%0AStatus: PENDING / ගෙවීමට ඇත ❌`) 
        : `*නැණදිය Progress Report*%0AStudent: ${s.name}%0AMonth: ${m}%0AMarks: ${s.marks?.[document.getElementById('activeMonth').value]||0}/100%0ARank: ${r}%0AProgress: ${rem}`;
        window.open(`https://wa.me/${s.wa}?text=${msg}`);
    }
    async function saveStudent(){const f=document.getElementById('regPhoto').files[0]; let ph="https://via.placeholder.com/150"; if(f)ph=await new Promise(r=>{const rd=new FileReader(); rd.onload=e=>r(e.target.result); rd.readAsDataURL(f);}); students.push({id:"NEN"+Date.now().toString().slice(-5), name:document.getElementById('regName').value, wa:document.getElementById('regWa').value, grade:document.getElementById('regGrade').value, photo:ph, att:{}, fees:{}, marks:{}}); db.ref('nenadiya_v4').set(students); bootstrap.Modal.getInstance(document.getElementById('regModal')).hide();}
    function showTab(id){document.querySelectorAll('.glass-card').forEach(s=>{if(s.id.includes('Sec'))s.classList.add('d-none')}); document.getElementById(id+'Sec').classList.remove('d-none'); document.querySelectorAll('.nav-link').forEach(l=>l.classList.remove('active')); event.target.classList.add('active');}
    function showID(i){const s=students[i]; document.getElementById('idName').innerText=s.name; document.getElementById('idGradeDisp').innerText=s.grade; document.getElementById('idVal').innerText=s.id; document.getElementById('idImg').src=s.photo; document.getElementById('idQr').innerHTML=""; new QRCode(document.getElementById('idQr'),{text:s.id,width:80,height:80}); new bootstrap.Modal(document.getElementById('idModal')).show();}
    function downloadID(){html2canvas(document.getElementById('idCardToExport')).then(c=>{let l=document.createElement('a'); l.download="NENADIYA_ID.png"; l.href=c.toDataURL(); l.click();});}
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
